<div class="min-h-screen bg-background flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="mb-10 text-center">
      <h1 class="font-display text-headline-lg font-bold text-primary tracking-tight">Reset password</h1>
      <p class="font-body text-body-md text-on-surface-variant mt-2">
        Enter your email and we will send you a reset link.
      </p>
    </div>

    <div class="bg-surface-container-lowest rounded-xl p-8 shadow-card">
      @if (sent()) {
        <div role="status" class="text-center space-y-4">
          <span class="material-symbols-outlined text-tertiary text-[48px]" aria-hidden="true">mark_email_read</span>
          <p class="font-body text-body-md text-on-surface">
            Check your inbox. If an account exists for that email, you will receive a reset link shortly.
          </p>
          <a routerLink="/login" class="font-display text-label-sm text-primary hover:underline">
            Back to sign in
          </a>
        </div>
      } @else {
        <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
          @if (error()) {
            <div role="alert" class="mb-6 px-4 py-3 rounded-lg bg-error-container text-on-error-container font-body text-label-sm">
              {{ error() }}
            </div>
          }

          <label class="block mb-6">
            <span class="font-body text-label-sm text-on-surface-variant block mb-1">Email address</span>
            <input
              type="email"
              formControlName="email"
              autocomplete="email"
              class="w-full rounded-lg bg-surface-container-low border border-outline-variant/30 px-3 py-2.5 font-body text-body-md text-on-surface placeholder:text-on-surface-variant focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-colors"
              placeholder="you@company.com"
            />
          </label>

          <button
            type="submit"
            [disabled]="loading()"
            class="w-full inline-flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg bg-primary text-on-primary font-display text-label-sm font-semibold transition-all duration-300 hover:-translate-y-0.5 hover:bg-primary-strong disabled:opacity-50 disabled:cursor-not-allowed focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-primary/40"
          >
            {{ loading() ? 'Sending...' : 'Send reset link' }}
          </button>

          <p class="mt-4 text-center font-body text-label-sm text-on-surface-variant">
            Remember your password?
            <a routerLink="/login" class="text-primary hover:underline">Sign in</a>
          </p>
        </form>
      }
    </div>
  </div>
</div>
